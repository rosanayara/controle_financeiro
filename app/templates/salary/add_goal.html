{% extends "base.html" %}

{% block title %}Adicionar Meta - Controle Real{% endblock %}

{% block page_header %}
    <div class="d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">
            <i class="bi bi-bullseye me-2"></i>Criar Nova Meta
        </h1>
        <small class="text-muted">Defina objetivos financeiros para alcançar</small>
    </div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Nova Meta Financeira</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome da Meta</label>
                        <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: Fundo de emergência, Viagem para Europa" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="valor_objetivo" class="form-label">Valor Objetivo (R$)</label>
                            <input type="number" step="0.01" class="form-control" id="valor_objetivo" name="valor_objetivo" placeholder="10000.00" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="valor_atual" class="form-label">Valor Atual (R$)</label>
                            <input type="number" step="0.01" class="form-control" id="valor_atual" name="valor_atual" placeholder="0.00" value="0">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-plus-circle me-2"></i>Criar Meta
                        </button>
                        <a href="{{ url_for('salary.goals') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Voltar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
