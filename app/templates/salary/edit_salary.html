{% extends "base.html" %}

{% block title %}Editar Salário - Controle Real{% endblock %}

{% block page_header %}
    <div class="d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">
            <i class="bi bi-pencil-square me-2"></i>Editar Salário
        </h1>
        <small class="text-muted">Atualize o valor do seu salário bruto</small>
    </div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="bruto" class="form-label">Salário Bruto (R$)</label>
                        <input type="number" step="0.01" class="form-control" id="bruto" name="bruto" value="{{ salario.bruto }}" required>
                    </div>

                    <div class="mb-4">
                        <small class="text-muted">O salário líquido será recalculado automaticamente.</small>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-2"></i>Salvar Alterações
                        </button>
                        <a href="{{ url_for('salary.salary') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left-circle me-2"></i>Voltar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
