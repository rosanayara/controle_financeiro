<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Despesa - Controle Real</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .expense-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            width: 100%;
            max-width: 500px;
        }
        .btn-expense {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-weight: 600;
        }
        .btn-expense:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="expense-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h2 class="fw-bold text-primary mb-0">Adicionar Despesa</h2>
                            <p class="text-muted mb-0">Registre uma nova despesa</p>
                        </div>
                        <a href="{{ url_for('finance.expenses') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Voltar
                        </a>
                    </div>

                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="valor" class="form-label">Valor (R$)</label>
                                <input type="number" step="0.01" class="form-control" id="valor" name="valor" placeholder="0.00" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="categoria" class="form-label">Categoria</label>
                                <select class="form-control" id="categoria" name="categoria" required>
                                    <option value="">Selecione...</option>
                                    <option value="Alimentação">🍽️ Alimentação</option>
                                    <option value="Transporte">🚗 Transporte</option>
                                    <option value="Moradia">🏠 Moradia</option>
                                    <option value="Lazer">🎬 Lazer</option>
                                    <option value="Saúde">🏥 Saúde</option>
                                    <option value="Educação">📚 Educação</option>
                                    <option value="Vestuário">👕 Vestuário</option>
                                    <option value="Outros">📦 Outros</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="descricao" class="form-label">Descrição (opcional)</label>
                            <input type="text" class="form-control" id="descricao" name="descricao" placeholder="Ex: Supermercado, Combustível, etc.">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-expense">
                                <i class="bi bi-plus-circle me-2"></i>Adicionar Despesa
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
